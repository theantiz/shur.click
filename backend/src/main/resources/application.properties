server.forward-headers-strategy=framework
server.port=${PORT:5000}

# Load optional .env-style file (only works if present as classpath resource)
# For local development, use SPRING_CONFIG_ADDITIONAL_LOCATION or export env vars.
# (Spring Boot does not natively parse arbitrary .env files.)


# Database
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Security/auth
# JWT secret (required in production)
app.jwt.secret=${JWT_SECRET:}

app.jwt.expMinutes=${JWT_EXP_MINUTES:10080}
app.public.base-url=${APP_PUBLIC_BASE_URL:https://shur.click}
app.auth.google.clientId=${GOOGLE_CLIENT_ID}


# Redis cache (optional; set app.redis.enabled=true after configuring host/password)
app.redis.enabled=${REDIS_ENABLED:false}
app.redis.url-cache-ttl-seconds=3600
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}
spring.data.redis.repositories.enabled=false


# Billing
app.razorpay.keyId=${RAZORPAY_KEY_ID}
app.razorpay.keySecret=${RAZORPAY_KEY_SECRET}
app.razorpay.currency=${RAZORPAY_CURRENCY:INR}
app.razorpay.proAmountSubunits=${RAZORPAY_PRO_AMOUNT_SUBUNITS:20000}

# Mail / Resend
app.resend.api-key=${RESEND_API_KEY}
app.resend.base-url=${RESEND_BASE_URL:https://api.resend.com}
app.mail.from=${MAIL_FROM:noreply@shur.click}
app.feedback.to=${MAIL_FEEDBACK_TO:noreply@shur.click}

app.mail.appName=${MAIL_APP_NAME:shur.click}

# Logging
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.springframework.security=INFO

# Rate limiting (simple in-memory per-IP buckets)
app.ratelimit.enabled=true
app.ratelimit.window-seconds=60
app.ratelimit.max-requests=30
# Comma-separated paths to exempt by prefix (optional)
app.ratelimit.exempt-prefixes=/api/auth/open,/api/health
# Comma-separated exact paths to limit (relative to context)
# Leave empty to limit everything.
app.ratelimit.limited-paths=/api/auth/register,/api/auth/login,/api/auth/register-init,/api/auth/register-verify,/api/auth/forgot-password,/api/auth/forgot-password-verify,/api/auth/reset-password,/api/urls

