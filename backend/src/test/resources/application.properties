spring.datasource.url=jdbc:h2:mem:urlshorter;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
app.jwt.secret=TEST_ONLY_SECRET_KEY_MUST_BE_LONG_ENOUGH_1234567890
app.jwt.expMinutes=60
app.auth.otp.returnInResponse=false
app.resend.api-key=test-key
app.resend.base-url=http://localhost:9
app.mail.from=test@example.com
app.feedback.to=test-feedback@example.com
app.redis.enabled=false
spring.data.redis.repositories.enabled=false
