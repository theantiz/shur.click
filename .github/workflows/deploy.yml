name: shur.click CI/CD

on:
  push:
    branches: [main]

env:
  ACR_LOGIN_SERVER: shurclickacr.azurecr.io
  IMAGE_NAME: shurclickacr.azurecr.io/shur-click

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q
        working-directory: backend

      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login shurclickacr.azurecr.io -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          docker build --platform linux/amd64 -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} ./backend
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}