name: shur.click-production

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build jar with Maven
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: Log in to ACR
        run: az acr login --name shurclickregistry

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t shurclickregistry.azurecr.io/shurclick-backend:${{ github.sha }} \
                        -t shurclickregistry.azurecr.io/shurclick-backend:latest .

      - name: Push image to ACR
        run: |
          docker push shurclickregistry.azurecr.io/shurclick-backend:${{ github.sha }}
          docker push shurclickregistry.azurecr.io/shurclick-backend:latest

      - name: Deploy new image to Container App
        run: |
          az containerapp update \
            --name shurclick-backend \
            --resource-group shurclick-rg \
            --image shurclickregistry.azurecr.io/shurclick-backend:${{ github.sha }}