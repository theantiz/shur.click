name: Trigger auto deployment for shurclick-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/shurclick-api-AutoDeployTrigger-d256ab09-a52a-4939-b535-878cd8bdf846.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SHURCLICKAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SHURCLICKAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SHURCLICKAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: shurclickacr.azurecr.io
          registryUsername: ${{ secrets.SHURCLICKAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SHURCLICKAPI_REGISTRY_PASSWORD }}
          containerAppName: shurclick-api
          resourceGroup: shurclick-rg
          imageToBuild: shurclickacr.azurecr.io/shurclick-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


