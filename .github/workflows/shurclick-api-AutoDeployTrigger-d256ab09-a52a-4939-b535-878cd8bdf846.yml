name: Trigger auto deployment for shurclick-api

on:
push:
branches:
- main
paths:
- 'backend/**'
- '.github/workflows/**'

workflow_dispatch:

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
permissions:
  id-token: write
  contents: read

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Azure Login
    uses: azure/login@v2
    with:
      client-id: ${{ secrets.SHURCLICKAPI_AZURE_CLIENT_ID }}
      tenant-id: ${{ secrets.SHURCLICKAPI_AZURE_TENANT_ID }}
      subscription-id: ${{ secrets.SHURCLICKAPI_AZURE_SUBSCRIPTION_ID }}

  - name: Build and Deploy Container App
    uses: azure/container-apps-deploy-action@v2
    with:
      appSourcePath: ${{ github.workspace }}
      dockerfilePath: backend/Dockerfile
      registryUrl: shurclickacr.azurecr.io
      registryUsername: ${{ secrets.SHURCLICKAPI_REGISTRY_USERNAME }}
      registryPassword: ${{ secrets.SHURCLICKAPI_REGISTRY_PASSWORD }}
      containerAppName: shurclick-api
      resourceGroup: shurclick-rg
      imageToBuild: shurclickacr.azurecr.io/shurclick-backend:${{ github.sha }}
```
